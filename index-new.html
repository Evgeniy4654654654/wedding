<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Евгений & Злата — Imperial Lavender</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#faf7f4;
--lavender:#cdbbef;
--lavender-dark:#8e74c5;
--plum:#4e3b73;
--champagne:#efe6dd;
--text:#2b2731;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
font-family:'Montserrat',sans-serif;
color:var(--text);
overflow-x:hidden;
}

.hero{
min-height:100vh;
display:grid;
grid-template-columns:1fr 1.1fr;
}

.hero-left{
display:flex;
align-items:center;
justify-content:center;
padding:80px;
}

.hero-content h1{
font-family:'Cormorant Garamond',serif;
font-size:120px;
font-weight:500;
line-height:.85;
}

.hero-date{
margin-top:30px;
font-size:18px;
letter-spacing:4px;
text-transform:uppercase;
}

.hero-right img{
width:100%;
height:100vh;
object-fit:cover;
}

section{
padding:120px 24px;
}

.container{
max-width:1200px;
margin:auto;
}

.title{
font-family:'Cormorant Garamond',serif;
font-size:68px;
text-align:center;
margin-bottom:40px;
font-weight:500;
}

.text{
max-width:900px;
margin:auto;
font-size:20px;
line-height:2;
text-align:center;
}

.statement{
background:linear-gradient(
135deg,
#efe7ff,
#faf7f4
);
}

.statement h2{
font-family:'Cormorant Garamond',serif;
font-size:82px;
text-align:center;
max-width:900px;
margin:auto;
font-weight:500;
}

.gallery-editorial{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-top:50px;
}

.gallery-editorial img{
width:100%;
border-radius:30px;
object-fit:cover;
}

.large-photo{
height:700px;
}

.small-stack{
display:grid;
gap:20px;
}

.small-stack img{
height:340px;
}

.timeline{
max-width:700px;
margin:auto;
margin-top:60px;
border-left:2px solid var(--lavender-dark);
padding-left:40px;
}

.timeline-item{
margin-bottom:50px;
}

.timeline-time{
font-size:32px;
font-weight:600;
color:var(--lavender-dark);
margin-bottom:10px;
}

.map-card{
background:white;
padding:50px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,.06);
text-align:center;
}

.route-btn{
display:inline-block;
margin-top:25px;
padding:18px 34px;
border-radius:40px;
background:var(--lavender-dark);
color:white;
text-decoration:none;
}

.fabric-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:60px;
}

.fabric{
height:260px;
border-radius:24px;
display:flex;
align-items:end;
padding:24px;
font-weight:500;
font-size:18px;
color:#fff;
}

.fabric-1{
background:linear-gradient(
135deg,
#d9c8b4,
#b89f86
);
}

.fabric-2{
background:linear-gradient(
135deg,
#efe8df,
#d7c7b3
);
}

.fabric-3{
background:linear-gradient(
135deg,
#cdbbef,
#8e74c5
);
}

.fabric-4{
background:linear-gradient(
135deg,
#d6bcc7,
#bc98a8
);
}

.rsvp{
background:white;
padding:60px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,.05);
max-width:800px;
margin:auto;
}

.footer{
background:#efe7ff;
padding:150px 20px;
text-align:center;
}

.monogram{
font-family:'Cormorant Garamond',serif;
font-size:120px;
color:var(--plum);
}

.footer-text{
font-size:24px;
max-width:700px;
margin:30px auto;
line-height:1.8;
}

@media(max-width:900px){

.hero{
grid-template-columns:1fr;
}

.hero-right img{
height:60vh;
}

.hero-content h1{
font-size:72px;
}

.title{
font-size:48px;
}

.statement h2{
font-size:50px;
}

.gallery-editorial{
grid-template-columns:1fr;
}

.fabric-grid{
grid-template-columns:1fr 1fr;
}

}

</style>
</head>
<body>

<section class="hero">

<div class="hero-left">

<div class="hero-content">

<h1>
Евгений<br>
&<br>
Злата
</h1>

<div class="hero-date">
04 сентября 2026
</div>

</div>

</div>

<div class="hero-right">
<img src="IMG_4226.jpeg" alt="">
</div>

</section>

</body>
</html>
